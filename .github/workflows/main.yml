name: Nightly Map Update

on:
  schedule:
    - cron: "0 6 * * *"     # 6am UTC daily
  workflow_dispatch:         # manual trigger from GitHub UI

jobs:
  update-maps:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.11

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Download latest visits CSV
      env:
        BT_USERNAME: ${{ secrets.BT_USERNAME }}
        BT_PASSWORD: ${{ secrets.BT_PASSWORD }}
      run: |
        python download_visits.py
        # Outputs: VisitsData/VisitsReport_YYYY-MM-DD_HH-MM-SS.csv

    - name: Generate clustered map HTML
      run: |
        # Find latest visits CSV
        LATEST_CSV=$(ls -t VisitsData/*.csv | head -1)
        sed "s|visitsreport2026-03-09-2.csv|$LATEST_CSV|g" try.py > temp_try.py
        python temp_try.py
        rm temp_try.py
        # Outputs: RouteOptimization_Clustered_Map.html

    - name: Generate on-premise map HTML  
      run: |
        # Repeat for try2.py (adjust hardcoded CSV path if needed)
        LATEST_CSV=$(ls -t VisitsData/*.csv | head -1)
        # ... similar sed + python for try2.py ...

    - name: Commit and push updates
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add *.html VisitsData/
        git commit -m "Nightly update: new visits data & maps [skip ci]" || echo "No changes"
        git push
