name: Nightly Map Update

on:
  schedule:
    - cron: "0 6 * * *"     # 6am UTC daily
  workflow_dispatch:         # manual trigger from GitHub UI

jobs:
  update-maps:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.11

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Download latest visits CSV
      id: download
      env:
        BT_USERNAME: ${{ secrets.BT_USERNAME }}
        BT_PASSWORD: ${{ secrets.BT_PASSWORD }}
      run: |
        python download_visits.py
        LATEST_CSV=$(ls -t VisitsData/*.csv | head -1)
        echo "csv_path=$LATEST_CSV" >> $GITHUB_OUTPUT

    - name: Generate clustered map HTML (index.html)
      run: |
        LATEST_CSV="${{ steps.download.outputs.csv_path }}"
        sed "s|visitsreport2026-03-09-2.csv|$LATEST_CSV|g" try.py > temp_try.py
        # Rename output file from RouteOptimization_Clustered_Map.html → index.html
        sed -i 's|with open("RouteOptimization_Clustered_Map.html"|with open("index.html"|g' temp_try.py
        python temp_try.py
        rm temp_try.py

    - name: Generate on-premise map HTML (RouteOptimization_OnPremise_Map.html)
      run: |
        LATEST_CSV="${{ steps.download.outputs.csv_path }}"
        sed "s|visitsreport2026-03-09-2.csv|$LATEST_CSV|g" try2.py > temp_try2.py
        # Rename output file from RouteOptimization_OnPremise_Map.html → RouteOptimization_OnPremise_Map.html
        sed -i 's|with open("RouteOptimization_OnPremise_Map.html"|with open("RouteOptimization_OnPremise_Map.html"|g' temp_try2.py
        python temp_try2.py
        rm temp_try2.py

    - name: Commit and push updates
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add index.html RouteOptimization_OnPremise_Map.html VisitsData/
        git commit -m "Nightly update: new visits data & maps [skip ci]" || echo "No changes"
        git push
