name: Nightly Map Update
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  update-maps:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Install Chrome
      run: |
        wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
        sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" > /etc/apt/sources.list.d/google-chrome.list'
        sudo apt-get update && sudo apt-get install -y google-chrome-stable

    - name: Download latest visits CSV
      env:
        BT_USERNAME: ${{ secrets.BT_USERNAME }}
        BT_PASSWORD: ${{ secrets.BT_PASSWORD }}
      run: python download_visits.py

    - name: Verify CSV downloaded
      run: |
        ls -lh VisitsData/
        LATEST=$(ls -t VisitsData/*.csv | head -1)
        echo "Found: $LATEST"
        head -5 "$LATEST"

    - name: Debug visit date matching
      run: |
        python3 - <<'EOF'
        import sys, os, glob, pandas as pd

        csv_files = glob.glob("VisitsData/*.csv")
        visits_file = max(csv_files, key=os.path.getmtime)
        print(f"\n=== CSV FILE: {visits_file} ===")

        visits = pd.read_csv(visits_file, quotechar='"', on_bad_lines='skip', low_memory=False)
        print(f"Shape: {visits.shape}")
        print(f"Columns: {list(visits.columns)}")

        print(f"\n=== RAW 'Visit Date' SAMPLE ===")
        print(visits['Visit Date'].head(10).tolist())

        visits["Visit Date"] = pd.to_datetime(visits["Visit Date"], errors="coerce")
        print(f"\n=== PARSED 'Visit Date' SAMPLE ===")
        print(visits['Visit Date'].head(10).tolist())
        print(f"NaT count: {visits['Visit Date'].isna().sum()} / {len(visits)}")

        print(f"\n=== MOST RECENT VISITS ===")
        visits["Business Name"] = visits["Business Name"].str.strip()
        visits_latest = (
            visits.dropna(subset=["Visit Date"])
            .sort_values("Visit Date")
            .groupby("Business Name", as_index=False)
            .last()
        )
        print(f"Unique businesses with valid dates: {len(visits_latest)}")
        print(visits_latest[["Business Name","Visit Date"]].tail(10).to_string())

        today = pd.Timestamp.today().normalize()
        print(f"\n=== TODAY: {today} ===")
        visits_latest["days_ago"] = (today - visits_latest["Visit Date"].dt.normalize()).dt.days
        print(visits_latest[["Business Name","Visit Date","days_ago"]].tail(10).to_string())
        print(f"\nMin days ago: {visits_latest['days_ago'].min()}")
        print(f"Max days ago: {visits_latest['days_ago'].max()}")

        def bucket(d):
            if d <= 7:   return "green (<=7d)"
            if d <= 14:  return "orange (<=14d)"
            if d <= 21:  return "red (<=21d)"
            return "dark red (>21d)"

        visits_latest["color"] = visits_latest["days_ago"].apply(bucket)
        print(f"\n=== COLOR DISTRIBUTION ===")
        print(visits_latest["color"].value_counts().to_string())
        EOF

    - name: Generate clustered map (index.html)
      run: |
        LATEST=$(ls -t VisitsData/*.csv | head -1)
        echo "Using CSV: $LATEST"
        python try.py "$LATEST"

    - name: Generate on-premise map (RouteOptimization_OnPremise_Map.html)
      run: |
        LATEST=$(ls -t VisitsData/*.csv | head -1)
        echo "Using CSV: $LATEST"
        python try2.py "$LATEST"

    - name: Commit and push updates
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add index.html RouteOptimization_OnPremise_Map.html VisitsData/
        git status
        git commit -m "Nightly update $(date +'%Y-%m-%d') [skip ci]" || echo "No changes to commit"
        git push
